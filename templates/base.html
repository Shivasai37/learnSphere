<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LearnSphere{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --surface: #111827;
            --surface2: #1a2235;
            --accent: #4f8ef7;
            --accent2: #7c5cfc;
            --green: #22d3a5;
            --orange: #f59e42;
            --red: #f87171;
            --text: #e8eaf0;
            --muted: #8892a4;
            --border: #1e2d45;
            --glow: 0 0 30px rgba(79,142,247,0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        /* NAV */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2.5rem;
            background: rgba(10,14,26,0.95);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .nav-links { display: flex; gap: 0.5rem; }
        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--text);
            background: var(--surface2);
        }
        .nav-links a.active { color: var(--accent); }
        /* MAIN */
        main { padding: 2.5rem; max-width: 1100px; margin: 0 auto; }
        /* PAGE HEADER */
        .page-header { margin-bottom: 2rem; }
        .page-header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
        }
        .page-header p { color: var(--muted); font-size: 1rem; }
        /* CARD */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.8rem;
            margin-bottom: 1.5rem;
        }
        .card h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            color: var(--text);
        }
        /* FORM ELEMENTS */
        label {
            display: block;
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        input[type="text"], textarea, select {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.8rem 1rem;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 1rem;
        }
        input[type="text"]:focus, textarea:focus, select:focus {
            border-color: var(--accent);
        }
        textarea { min-height: 100px; resize: vertical; }
        select option { background: var(--surface2); }
        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.6rem;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        /* RESULT AREA */
        .result-area {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.5rem;
            white-space: pre-wrap;
            font-size: 0.92rem;
            line-height: 1.7;
            color: var(--text);
            min-height: 120px;
            display: none;
        }
        .result-area.visible { display: block; }
        /* CODE BLOCK */
        .code-block {
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.5rem;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            color: #c9d1d9;
            overflow-x: auto;
            white-space: pre;
            display: none;
        }
        .code-block.visible { display: block; }
        /* LOADING */
        .loading {
            display: none;
            align-items: center;
            gap: 0.8rem;
            color: var(--muted);
            padding: 1rem 0;
        }
        .loading.visible { display: flex; }
        .spinner {
            width: 20px; height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* BADGE */
        .badge {
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
        }
        .badge-blue { background: rgba(79,142,247,0.15); color: var(--accent); }
        .badge-green { background: rgba(34,211,165,0.15); color: var(--green); }
        .badge-orange { background: rgba(245,158,66,0.15); color: var(--orange); }
        /* ERROR */
        .error-msg {
            background: rgba(248,113,113,0.1);
            border: 1px solid rgba(248,113,113,0.3);
            color: var(--red);
            border-radius: 8px;
            padding: 0.8rem 1rem;
            font-size: 0.9rem;
            display: none;
        }
        .error-msg.visible { display: block; }
        /* ROW */
        .row { display: flex; gap: 1rem; }
        .row > * { flex: 1; }
        /* AUDIO PLAYER */
        audio { width: 100%; border-radius: 8px; margin-top: 1rem; }
        /* DIVIDER */
        .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }
        /* FLEX ROW */
        .flex-row { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">⬡ LearnSphere</a>
        <div class="nav-links">
            <a href="/" {% if request.path == '/' %}class="active"{% endif %}>🏠 Home</a>
            <a href="/text" {% if request.path == '/text' %}class="active"{% endif %}>📖 Text</a>
            <a href="/code" {% if request.path == '/code' %}class="active"{% endif %}>💻 Code</a>
            <a href="/audio" {% if request.path == '/audio' %}class="active"{% endif %}>🎧 Audio</a>
            <a href="/visual" {% if request.path == '/visual' %}class="active"{% endif %}>🖼️ Visual</a>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
